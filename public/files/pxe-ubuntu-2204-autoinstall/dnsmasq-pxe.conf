# Proxy-DHCP PXE config for one target machine.
# Install as: /etc/dnsmasq.d/pxe-ubuntu-22.04.conf

port=0
interface=<PXE_INTERFACE>
bind-interfaces
log-dhcp

dhcp-range=192.168.2.0,proxy,255.255.255.0
dhcp-host=<TARGET_MAC>,set:pxe_target
dhcp-ignore=tag:!pxe_target

enable-tftp
tftp-root=/srv/tftp

dhcp-match=set:efi-x86_64,option:client-arch,7
dhcp-match=set:efi-x86_64,option:client-arch,9
dhcp-match=set:bios,option:client-arch,0

dhcp-boot=tag:pxe_target,tag:efi-x86_64,grubx64.efi
dhcp-boot=tag:pxe_target,tag:bios,pxelinux.0
dhcp-boot=tag:pxe_target,pxelinux.0

pxe-service=tag:pxe_target,tag:efi-x86_64,X86-64_EFI,"Install Ubuntu Server 22.04 LTS",grubx64.efi
pxe-service=tag:pxe_target,tag:bios,X86PC,"Install Ubuntu Server 22.04 LTS",pxelinux
